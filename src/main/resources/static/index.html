<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>F1 Live Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Arial Narrow', Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 200px;
            flex-shrink: 0;
            background: #161616;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
            gap: 16px;
        }

        #logo {
            color: #e10600;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #status {
            font-size: 11px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #444;
            flex-shrink: 0;
        }

        #session-info {
            font-size: 11px;
            color: #aaa;
            line-height: 1.7;
            border-top: 1px solid #2a2a2a;
            padding-top: 12px;
        }

        #session-info strong {
            color: #fff;
            font-size: 12px;
            display: block;
            margin-bottom: 2px;
        }

        #driver-list {
            flex: 1;
            overflow-y: auto;
            border-top: 1px solid #2a2a2a;
            padding-top: 12px;
        }

        #driver-list-title {
            font-size: 10px;
            color: #555;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .driver-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 0;
            font-size: 12px;
        }

        .driver-color-bar {
            width: 3px;
            height: 18px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .driver-num {
            color: #555;
            font-size: 10px;
            width: 20px;
        }

        .driver-acronym {
            font-weight: 700;
            letter-spacing: 1px;
            color: #eee;
        }

        /* ── Canvas area ── */
        #main {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #overlay-msg {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #555;
            pointer-events: none;
        }

        /* ── Scrollbar ── */
        #driver-list::-webkit-scrollbar { width: 4px; }
        #driver-list::-webkit-scrollbar-track { background: transparent; }
        #driver-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="logo">F1 LIVE</div>

    <div id="status">
        <span id="status-dot"></span>
        <span id="status-text">연결 중...</span>
    </div>

    <div id="session-info"></div>

    <div id="driver-list">
        <div id="driver-list-title">Drivers</div>
        <div id="driver-items"></div>
    </div>
</div>

<div id="main">
    <canvas id="track"></canvas>
    <div id="overlay-msg">세션 데이터 로딩 중...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const canvas = document.getElementById('track');
    const ctx = canvas.getContext('2d');
    const overlayMsg = document.getElementById('overlay-msg');

    // ── State ──
    let trackPoints = [];          // [{x, y}, ...]
    let bounds = null;             // {minX, maxX, minY, maxY}
    const drivers = new Map();     // driverNumber → {nameAcronym, teamColour, target:{x,y}, current:{x,y}}

    // ── Canvas sizing ──
    function resizeCanvas() {
        const main = document.getElementById('main');
        canvas.width = main.clientWidth;
        canvas.height = main.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ── Coordinate transform ──
    function toCanvas(x, y) {
        const PAD = 60;
        const cx = PAD + (x - bounds.minX) / (bounds.maxX - bounds.minX) * (canvas.width - PAD * 2);
        const cy = PAD + (y - bounds.minY) / (bounds.maxY - bounds.minY) * (canvas.height - PAD * 2);
        return { cx, cy };
    }

    // ── Draw track outline ──
    function drawTrack() {
        if (trackPoints.length < 2) return;

        const pts = trackPoints.map(p => toCanvas(p.x, p.y));

        // 외곽 두꺼운 글로우 레이어
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 22;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.moveTo(pts[0].cx, pts[0].cy);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].cx, pts[i].cy);
        ctx.closePath();
        ctx.stroke();

        // 트랙 면 (회색)
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 10;
        ctx.moveTo(pts[0].cx, pts[0].cy);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].cx, pts[i].cy);
        ctx.closePath();
        ctx.stroke();

        // 트랙 중심선 (하얀 점선)
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.45)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 10]);
        ctx.moveTo(pts[0].cx, pts[0].cy);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].cx, pts[i].cy);
        ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // ── Draw drivers ──
    function drawDrivers() {
        drivers.forEach((driver, driverNumber) => {
            if (!driver.current) return;

            const { cx, cy } = toCanvas(driver.current.x, driver.current.y);
            const color = '#' + (driver.teamColour || 'FFFFFF');

            // 글로우
            ctx.save();
            ctx.shadowColor = color;
            ctx.shadowBlur = 14;

            // 원
            ctx.beginPath();
            ctx.arc(cx, cy, 7, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            ctx.restore();

            // 테두리
            ctx.beginPath();
            ctx.arc(cx, cy, 7, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // 드라이버 약어
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 9px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(driver.nameAcronym || String(driverNumber), cx, cy - 13);
        });
    }

    // ── Animation loop (60fps + lerp) ──
    let lastTs = 0;

    function animate(ts) {
        const dt = Math.min((ts - lastTs) / 1000, 0.1);
        lastTs = ts;

        const alpha = 1 - Math.pow(0.001, dt); // dt=0.016 → ~0.9, 빠른 수렴

        drivers.forEach(driver => {
            if (!driver.target) return;
            if (!driver.current) {
                driver.current = { ...driver.target };
                return;
            }
            driver.current.x += (driver.target.x - driver.current.x) * alpha;
            driver.current.y += (driver.target.y - driver.current.y) * alpha;
        });

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (bounds) {
            drawTrack();
            drawDrivers();
        }

        requestAnimationFrame(animate);
    }

    // ── Status UI ──
    function setStatus(text, color) {
        document.getElementById('status-text').textContent = text;
        document.getElementById('status-dot').style.background = color;
    }

    // ── Driver list sidebar ──
    function updateDriverList() {
        const el = document.getElementById('driver-items');
        el.innerHTML = '';
        const sorted = [...drivers.entries()].sort((a, b) => a[0] - b[0]);
        sorted.forEach(([num, d]) => {
            const color = '#' + (d.teamColour || 'FFFFFF');
            el.innerHTML += `
                <div class="driver-item">
                    <div class="driver-color-bar" style="background:${color}"></div>
                    <span class="driver-num">${num}</span>
                    <span class="driver-acronym">${d.nameAcronym || '???'}</span>
                </div>`;
        });
    }

    // ── WebSocket ──
    function connect(sessionKey) {
        const socket = new SockJS('/ws');
        const stomp = Stomp.over(socket);
        stomp.debug = null;

        stomp.connect({}, () => {
            setStatus('LIVE', '#00e676');
            overlayMsg.style.display = 'none';

            stomp.subscribe(`/topic/locations/${sessionKey}`, msg => {
                const data = JSON.parse(msg.body);

                data.positions.forEach(pos => {
                    if (!drivers.has(pos.driverNumber)) {
                        drivers.set(pos.driverNumber, {
                            nameAcronym: pos.nameAcronym,
                            teamColour: pos.teamColour,
                            target: null,
                            current: null
                        });
                    }
                    const d = drivers.get(pos.driverNumber);
                    d.nameAcronym = pos.nameAcronym;
                    d.teamColour = pos.teamColour;
                    d.target = { x: pos.x, y: pos.y };
                });

                updateDriverList();
            });
        }, () => {
            setStatus('연결 끊김', '#ff5252');
            setTimeout(() => connect(sessionKey), 5000);
        });
    }

    // ── Init ──
    fetch('/api/v1/sessions/current')
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(session => {
            const key = session.session_key;

            document.getElementById('session-info').innerHTML =
                `<strong>${session.session_name}</strong>${session.location}<br>${session.country_name}`;

            setStatus('트랙 로딩 중...', '#ffa726');

            return fetch(`/api/v1/sessions/${key}/track`)
                .then(r => r.json())
                .then(points => {
                    if (!points || points.length === 0) {
                        overlayMsg.textContent = '트랙 데이터 없음';
                        return;
                    }

                    trackPoints = points;
                    bounds = {
                        minX: Math.min(...points.map(p => p.x)),
                        maxX: Math.max(...points.map(p => p.x)),
                        minY: Math.min(...points.map(p => p.y)),
                        maxY: Math.max(...points.map(p => p.y)),
                    };

                    requestAnimationFrame(animate);
                    connect(key);
                });
        })
        .catch(() => {
            overlayMsg.textContent = '현재 진행 중인 세션이 없습니다';
            setStatus('오프시즌', '#555');
        });
</script>
</body>
</html>
